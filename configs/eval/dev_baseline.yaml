name: dev_baseline
task_pack: data/task_packs/repo_patch_python_v0
tasks:
  - repair_jsonl_deduper
  - preserve_cli_error_codes
  - repair_config_precedence
split: dev
attempts: 1
replay:
  enabled: true
  scope: control_policies
  repeats: 1
policies:
  oracle:
    type: scorer_control_patch
    control: oracle
  noop:
    type: scorer_control_patch
    control: bad.noop
  public-tests-only:
    type: scorer_control_patch
    control: bad.public_only
  agent-happy:
    type: agent_control_script
    control: happy
  agent-malformed:
    type: agent_control_script
    control: malformed
  agent-recoverable:
    type: agent_control_script
    control: recoverable
trace:
  version: trace_v0
  capture_stdout: true
  capture_stderr: true
  capture_diff: true
