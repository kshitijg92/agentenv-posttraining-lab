name: progressive_dev_controls
task_pack: data/task_packs/repo_patch_python_v0
tasks:
  - repair_alias_chain
  - repair_inventory_transaction
  - repair_access_policy
  - repair_config_inheritance
  - repair_event_rollup
  - repair_job_dispatch
split: dev
policies:
  oracle:
    type: scorer_control_patch
    control: oracle
    attempts: 1
    replay:
      repeats: 1
  noop:
    type: scorer_control_patch
    control: bad.noop
    attempts: 1
    replay:
      repeats: 1
  public-tests-only:
    type: scorer_control_patch
    control: bad.public_only
    attempts: 1
    replay:
      repeats: 1
  agent-happy:
    type: agent_control_script
    control: happy
    attempts: 1
    replay:
      repeats: 1
  agent-malformed:
    type: agent_control_script
    control: malformed
    attempts: 1
    replay:
      repeats: 1
  agent-recoverable:
    type: agent_control_script
    control: recoverable
    attempts: 1
    replay:
      repeats: 1
trace:
  version: trace_v0
  capture_stdout: true
  capture_stderr: true
  capture_diff: true
