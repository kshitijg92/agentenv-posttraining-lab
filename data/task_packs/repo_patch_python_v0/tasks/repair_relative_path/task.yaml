id: repair_relative_path
domain: repo_patch_python
split: dev
instruction: "Fix normalize_relative_path so it canonicalizes a POSIX-style relative path without consulting the filesystem. Ignore empty components and '.', resolve '..' by removing the prior component, and join the result with single '/'. Reject non-string and empty inputs, absolute paths, backslashes, NUL bytes, any '..' that would escape above the relative root, and any path that resolves to no components. Return the non-empty normalized relative path as a string."
seed_workspace: seed_workspace
allowed_tools: ["list_files", "read_file", "write_file", "run_tests"]
public_checks:
  - command: "uv run --quiet --frozen pytest tests/test_public.py"
    are_tests_idempotent: true
hidden_validators:
  - id: relative_path_pytest
    type: pytest
    path: hidden_tests
scoring:
  primary: hidden_pytest_pass
limits:
  timeout_seconds: 120
  max_turns: 20
  network: "off"
controls:
  scorer_control_patches:
    oracle: controls/scorer_control_patches/oracle.patch
    bad:
      noop: controls/scorer_control_patches/bad_noop.patch
      public_only: controls/scorer_control_patches/bad_public_only.patch
  agent_control_scripts:
    happy: controls/agent_control_scripts/happy_path.json
    malformed: controls/agent_control_scripts/malformed_json.json
    recoverable: controls/agent_control_scripts/bad_tool_input_then_recovery.json
replay:
  capture: ["patch", "commands", "stdout", "stderr", "final_diff", "attempt_result"]
leakage_canary: "CANARY_REPAIR_RELATIVE_PATH_PRIVATE"
