id: repair_csv_projection
domain: repo_patch_python
split: dev
instruction: "Fix project_csv so it parses CSV text with Python CSV quoting semantics and returns a canonical CSV containing the requested columns in the requested order. The input must be a string containing a non-empty, unique header and zero or more rows of exactly the header width; NUL bytes and malformed CSV are invalid. columns must be a finite non-string iterable containing at least one unique, non-empty string, and every requested column must exist. Emit a trailing newline and use '\n' as the record terminator. Non-string text, invalid columns, malformed input, duplicate headers, unknown columns, and ragged rows raise ValueError."
seed_workspace: seed_workspace
allowed_tools: ["list_files", "read_file", "write_file", "run_tests"]
public_checks:
  - command: "uv run --quiet --frozen pytest tests/test_public.py"
    are_tests_idempotent: true
hidden_validators:
  - id: csv_projection_pytest
    type: pytest
    path: hidden_tests
scoring:
  primary: hidden_pytest_pass
limits:
  timeout_seconds: 120
  max_turns: 20
  network: "off"
controls:
  scorer_control_patches:
    oracle: controls/scorer_control_patches/oracle.patch
    bad:
      noop: controls/scorer_control_patches/bad_noop.patch
      public_only: controls/scorer_control_patches/bad_public_only.patch
  agent_control_scripts:
    happy: controls/agent_control_scripts/happy_path.json
    malformed: controls/agent_control_scripts/malformed_json.json
    recoverable: controls/agent_control_scripts/bad_tool_input_then_recovery.json
replay:
  capture: ["patch", "commands", "stdout", "stderr", "final_diff", "attempt_result"]
leakage_canary: "CANARY_REPAIR_CSV_PROJECTION_PRIVATE"
