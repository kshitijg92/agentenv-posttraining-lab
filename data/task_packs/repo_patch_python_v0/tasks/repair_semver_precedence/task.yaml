id: repair_semver_precedence
domain: repo_patch_python
split: dev
instruction: "Fix compare_semver so it validates and compares a narrow Semantic Version form: MAJOR.MINOR.PATCH with an optional -PRERELEASE and no build metadata. Core numbers use ASCII digits and have no leading zero unless zero. Prerelease identifiers are non-empty ASCII alphanumeric-or-hyphen components separated by dots; numeric identifiers also forbid leading zeros. Return -1, 0, or 1. Compare core numbers numerically; a release is greater than its prerelease; numeric prerelease identifiers compare numerically and sort below non-numeric identifiers; non-numeric identifiers compare by ASCII order; if shared identifiers are equal, the shorter prerelease is lower. Non-string or invalid inputs raise ValueError."
seed_workspace: seed_workspace
allowed_tools: ["list_files", "read_file", "write_file", "run_tests"]
public_checks:
  - command: "uv run --quiet --frozen pytest tests/test_public.py"
    are_tests_idempotent: true
hidden_validators:
  - id: semver_precedence_pytest
    type: pytest
    path: hidden_tests
scoring:
  primary: hidden_pytest_pass
limits:
  timeout_seconds: 120
  max_turns: 20
  network: "off"
controls:
  scorer_control_patches:
    oracle: controls/scorer_control_patches/oracle.patch
    bad:
      noop: controls/scorer_control_patches/bad_noop.patch
      public_only: controls/scorer_control_patches/bad_public_only.patch
  agent_control_scripts:
    happy: controls/agent_control_scripts/happy_path.json
    malformed: controls/agent_control_scripts/malformed_json.json
    recoverable: controls/agent_control_scripts/bad_tool_input_then_recovery.json
replay:
  capture: ["patch", "commands", "stdout", "stderr", "final_diff", "attempt_result"]
leakage_canary: "CANARY_REPAIR_SEMVER_PRECEDENCE_PRIVATE"
