id: repair_config_inheritance
domain: repo_patch_python
split: dev
instruction: "Fix the configuration modules so load_config recursively loads a JSON entry file and returns a ServiceConfig. Every document must be an object containing only includes, service, limits, and labels. includes, when present, is a list of relative POSIX path strings; paths must not be absolute, contain backslashes or NUL, or resolve outside the entry file's parent directory, including through symlinks. Each include is resolved relative to the file that names it. Active include cycles are invalid. Includes are merged in listed order and the local document is merged last. service may contain only host (non-empty string) and port (integer other than bool in 1..65535). limits may contain only timeout_seconds (finite positive int or float other than bool) and retries (non-negative integer other than bool). labels maps non-empty string keys to string values. Nested sections merge field by field and labels merge key by key; later values override earlier ones. Missing values default to host=localhost, port=8080, timeout_seconds=30.0, retries=3, and empty labels. Missing files raise FileNotFoundError. Invalid JSON, cycles, unsafe includes, unknown keys, and malformed values raise ValueError. Repeated calls return fresh label mappings."
seed_workspace: seed_workspace
allowed_tools: ["list_files", "read_file", "write_file", "run_tests"]
public_checks:
  - command: "uv run --quiet --frozen pytest tests/test_public.py"
    are_tests_idempotent: true
hidden_validators:
  - id: config_inheritance_pytest
    type: pytest
    path: hidden_tests
scoring:
  primary: hidden_pytest_pass
limits:
  timeout_seconds: 120
  max_turns: 28
  network: "off"
controls:
  scorer_control_patches:
    oracle: controls/scorer_control_patches/oracle.patch
    bad:
      noop: controls/scorer_control_patches/bad_noop.patch
      public_only: controls/scorer_control_patches/bad_public_only.patch
  agent_control_scripts:
    happy: controls/agent_control_scripts/happy_path.json
    malformed: controls/agent_control_scripts/malformed_json.json
    recoverable: controls/agent_control_scripts/bad_tool_input_then_recovery.json
replay:
  capture: ["patch", "commands", "stdout", "stderr", "final_diff", "attempt_result"]
leakage_canary: "CANARY_REPAIR_CONFIG_INHERITANCE_PRIVATE"
