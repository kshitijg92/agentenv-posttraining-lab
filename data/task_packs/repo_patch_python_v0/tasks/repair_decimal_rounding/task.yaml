id: repair_decimal_rounding
domain: repo_patch_python
split: heldout_private
instruction: "Fix round_decimal so value is a string matching an optional sign, one or more ASCII decimal digits, and an optional fractional part with at least one digit. Whitespace, scientific notation, NaN, and infinity are invalid. places must be an integer other than bool from 0 through 6. Round exactly with decimal ROUND_HALF_EVEN, return fixed-point text with exactly places fractional digits, and normalize negative zero to unsigned zero. Reject malformed inputs with ValueError."
seed_workspace: seed_workspace
allowed_tools: ["list_files", "read_file", "write_file", "run_tests"]
public_checks:
  - command: "uv run --quiet --frozen pytest tests/test_public.py"
    are_tests_idempotent: true
hidden_validators:
  - id: repair_decimal_rounding_pytest
    type: pytest
    path: hidden_tests
scoring:
  primary: hidden_pytest_pass
limits:
  timeout_seconds: 120
  max_turns: 20
  network: "off"
controls:
  scorer_control_patches:
    oracle: controls/scorer_control_patches/oracle.patch
    bad:
      noop: controls/scorer_control_patches/bad_noop.patch
      public_only: controls/scorer_control_patches/bad_public_only.patch
  agent_control_scripts:
    happy: controls/agent_control_scripts/happy_path.json
    malformed: controls/agent_control_scripts/malformed_json.json
    recoverable: controls/agent_control_scripts/bad_tool_input_then_recovery.json
replay:
  capture: ["patch", "commands", "stdout", "stderr", "final_diff", "attempt_result"]
leakage_canary: "CANARY_REPAIR_DECIMAL_ROUNDING_PRIVATE"
