id: repair_stable_toposort
domain: repo_patch_python
split: heldout_private
instruction: "Fix stable_toposort so nodes may be any finite non-string iterable of unique non-empty strings and dependencies is a mapping from node names to finite non-string iterables of node names. Missing mapping entries mean no dependencies. Reject malformed inputs, unknown nodes, duplicate dependencies, self-dependencies, and cycles with ValueError. Return every node once in dependency order, choosing the earliest node from the original input whenever multiple nodes are ready. Do not mutate the inputs."
seed_workspace: seed_workspace
allowed_tools: ["list_files", "read_file", "write_file", "run_tests"]
public_checks:
  - command: "uv run --quiet --frozen pytest tests/test_public.py"
    are_tests_idempotent: true
hidden_validators:
  - id: repair_stable_toposort_pytest
    type: pytest
    path: hidden_tests
scoring:
  primary: hidden_pytest_pass
limits:
  timeout_seconds: 120
  max_turns: 20
  network: "off"
controls:
  scorer_control_patches:
    oracle: controls/scorer_control_patches/oracle.patch
    bad:
      noop: controls/scorer_control_patches/bad_noop.patch
      public_only: controls/scorer_control_patches/bad_public_only.patch
  agent_control_scripts:
    happy: controls/agent_control_scripts/happy_path.json
    malformed: controls/agent_control_scripts/malformed_json.json
    recoverable: controls/agent_control_scripts/bad_tool_input_then_recovery.json
replay:
  capture: ["patch", "commands", "stdout", "stderr", "final_diff", "attempt_result"]
leakage_canary: "CANARY_REPAIR_STABLE_TOPOSORT_PRIVATE"
