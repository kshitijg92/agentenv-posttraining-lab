id: repair_utf8_batching
domain: repo_patch_python
split: heldout_private
instruction: "Fix batch_records so records may be any finite non-string iterable of strings and max_items and max_bytes are positive integers other than bool. Return fresh greedy batches in input order: append a record to the current batch only when both the item-count limit and the total UTF-8 encoded byte limit remain satisfied, otherwise start a new batch. Reject an individual record larger than max_bytes and every malformed input with ValueError. Empty input returns an empty list. Do not mutate the input."
seed_workspace: seed_workspace
allowed_tools: ["list_files", "read_file", "write_file", "run_tests"]
public_checks:
  - command: "uv run --quiet --frozen pytest tests/test_public.py"
    are_tests_idempotent: true
hidden_validators:
  - id: repair_utf8_batching_pytest
    type: pytest
    path: hidden_tests
scoring:
  primary: hidden_pytest_pass
limits:
  timeout_seconds: 120
  max_turns: 20
  network: "off"
controls:
  scorer_control_patches:
    oracle: controls/scorer_control_patches/oracle.patch
    bad:
      noop: controls/scorer_control_patches/bad_noop.patch
      public_only: controls/scorer_control_patches/bad_public_only.patch
  agent_control_scripts:
    happy: controls/agent_control_scripts/happy_path.json
    malformed: controls/agent_control_scripts/malformed_json.json
    recoverable: controls/agent_control_scripts/bad_tool_input_then_recovery.json
replay:
  capture: ["patch", "commands", "stdout", "stderr", "final_diff", "attempt_result"]
leakage_canary: "CANARY_REPAIR_UTF8_BATCHING_PRIVATE"
