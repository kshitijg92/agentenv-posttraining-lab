id: preserve_cli_error_codes
domain: repo_patch_python
split: dev
instruction: "Fix the validate_records CLI so it reads JSONL records with string id and status fields, rejects duplicate ids, prints JSON status counts on success, preserves the documented exit codes, and avoids tracebacks for expected user or input errors."
seed_workspace: seed_workspace
allowed_tools: ["read_file", "write_file", "run_tests"]
public_checks:
  - command: "uv run pytest tests/test_public.py"
hidden_validators:
  - id: cli_behavior_pytest
    type: pytest
    path: hidden_tests
scoring:
  primary: hidden_pytest_pass
limits:
  timeout_seconds: 120
  max_turns: 10
  network: "off"
controls:
  scorer_control_patches:
    oracle: controls/scorer_control_patches/oracle.patch
    bad:
      noop: controls/scorer_control_patches/bad_noop.patch
      public_only: controls/scorer_control_patches/bad_public_only.patch
replay:
  capture: ["patch", "commands", "stdout", "stderr", "final_diff", "attempt_result"]
leakage_canary: "CANARY_PRESERVE_CLI_ERROR_CODES_PRIVATE"
