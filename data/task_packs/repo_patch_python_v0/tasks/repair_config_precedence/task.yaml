id: repair_config_precedence
domain: repo_patch_python
split: dev
instruction: "Fix the config loader so Settings are resolved from defaults, an optional JSON config file, and environment overrides with precedence environment > config file > defaults. Settings has host, port, and debug. JSON config keys are host, port, and debug only; unknown keys are invalid. APP_HOST, APP_PORT, and APP_DEBUG override matching fields. host must be a string. port must be an int or numeric string in the range 1..65535, and booleans are not valid ports. debug must be a bool or exactly \"true\" or \"false\"; values like \"1\", \"0\", \"yes\", and \"no\" are invalid. Passing None as the config path means no file is read, while a missing explicit path raises FileNotFoundError. Invalid config contents or invalid values raise ValueError."
seed_workspace: seed_workspace
allowed_tools: ["read_file", "write_file", "run_tests"]
public_checks:
  - command: "uv run pytest tests/test_public.py"
hidden_validators:
  - id: config_precedence_pytest
    type: pytest
    path: hidden_tests
scoring:
  primary: hidden_pytest_pass
limits:
  timeout_seconds: 120
  max_turns: 10
  network: "off"
controls:
  scorer_control_patches:
    oracle: controls/scorer_control_patches/oracle.patch
    bad:
      noop: controls/scorer_control_patches/bad_noop.patch
      public_only: controls/scorer_control_patches/bad_public_only.patch
  agent_control_scripts:
    happy: controls/agent_control_scripts/happy_path.json
    malformed: controls/agent_control_scripts/malformed_json.json
    recoverable: controls/agent_control_scripts/bad_tool_input_then_recovery.json
replay:
  capture: ["patch", "commands", "stdout", "stderr", "final_diff", "attempt_result"]
leakage_canary: "CANARY_REPAIR_CONFIG_PRECEDENCE_PRIVATE"
